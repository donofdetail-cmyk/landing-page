<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png?v=2" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />

  <!-- Preload Critical Assets -->


  <!-- Fonts are self-hosted via @fontsource imports in src/index.css. Do not add
       Google Fonts links here; the third-party request chain was removed on purpose. -->

  <!-- Google Site Verification -->
  <meta name="google-site-verification" content="ICw8VAi0CPoCm02oqBCeFO-q5gA6SQpRt6UcMM0Ad9Q" />

  <!-- Sitemap Discovery -->
  <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

  <!-- All per-page SEO (title, description, robots, canonical, Open Graph, Twitter) is injected by
       React Helmet and baked into static HTML at build time by scripts/prerender.mjs. Do NOT add a
       title element or managed meta tags here: Helmet appends rather than replaces them, producing
       duplicate tags in the prerendered output. -->
  <meta name="author" content="Don of Detail" />

  <!-- Constant Open Graph / Twitter tags (same on every route). Per-page og:title,
       og:description, og:url, og:image and twitter:* are injected by React Helmet.
       These are NOT managed by Helmet, so they live here once and apply site-wide.
       prerender.mjs is configured to leave these untouched during head dedup. -->
  <meta property="og:site_name" content="Don of Detail" />
  <meta property="og:locale" content="en_US" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Don of Detail mobile auto detailing and ceramic coating, Reno NV" />
  <!-- No static twitter:image: pages set per-page og:image via Helmet and X/Twitter
       falls back to og:image, so a static twitter:image here would override the
       per-page images with one generic card. -->


  <!-- JSON-LD: unified entity graph. Every page-level schema (Service, Article, AboutPage,
       ContactPage) references these nodes by @id instead of redeclaring them, so crawlers
       and LLMs resolve one business entity across the whole site. Do not redeclare the
       business anywhere else; reference {"@id": "https://donofdetail.com/#business"}. -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "AutomotiveBusiness",
          "@id": "https://donofdetail.com/#business",
          "name": "Don of Detail",
          "alternateName": "Don of Detail LLC",
          "description": "Reno's premier mobile auto detailing service specializing in ceramic coating, paint correction, interior and exterior detailing, and boat and RV detailing for the high desert climate of the Reno-Sparks area.",
          "url": "https://donofdetail.com",
          "logo": "https://donofdetail.com/logo.png",
          "image": "https://donofdetail.com/logo.png",
          "telephone": "+17752307035",
          "email": "contact@donofdetail.com",
          "priceRange": "$95 - $2,500",
          "paymentAccepted": "Cash, Credit Card, Debit Card",
          "currenciesAccepted": "USD",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Reno",
            "addressRegion": "NV",
            "addressCountry": "US"
          },
          "geo": {
            "@type": "GeoCoordinates",
            "latitude": 39.5296,
            "longitude": -119.8138
          },
          "openingHoursSpecification": [
            {
              "@type": "OpeningHoursSpecification",
              "dayOfWeek": [
                "Monday",
                "Tuesday",
                "Wednesday",
                "Thursday",
                "Friday",
                "Saturday",
                "Sunday"
              ],
              "opens": "08:00",
              "closes": "19:00"
            }
          ],
          "areaServed": [
            {
              "@type": "GeoCircle",
              "geoMidpoint": {"@type": "GeoCoordinates", "latitude": 39.5296, "longitude": -119.8138},
              "geoRadius": "40000"
            },
            {"@type": "City", "name": "Reno"},
            {"@type": "City", "name": "Sparks"},
            {"@type": "Place", "name": "Spanish Springs"},
            {"@type": "Place", "name": "Verdi"},
            {"@type": "Place", "name": "Sun Valley"},
            {"@type": "Place", "name": "Hidden Valley"},
            {"@type": "Place", "name": "Golden Valley"},
            {"@type": "Place", "name": "Mogul"},
            {"@type": "Place", "name": "Cold Springs"},
            {"@type": "Place", "name": "Lemmon Valley"},
            {"@type": "Place", "name": "Washoe Valley"},
            {"@type": "Place", "name": "Steamboat"}
          ],
          "founder": {"@id": "https://donofdetail.com/about#logan"},
          "knowsAbout": [
            "Ceramic Coating",
            "Paint Correction",
            "Auto Detailing",
            "Boat Detailing",
            "RV Detailing",
            "Headlight Restoration",
            "Engine Bay Detailing"
          ],
          "makesOffer": [
            {"@type": "Offer", "itemOffered": {"@id": "https://donofdetail.com/ceramic-coating-reno-nv#service"}},
            {"@type": "Offer", "itemOffered": {"@id": "https://donofdetail.com/paint-correction-reno-nv#service"}},
            {"@type": "Offer", "itemOffered": {"@id": "https://donofdetail.com/auto-detailing-reno-nv#service"}},
            {"@type": "Offer", "itemOffered": {"@id": "https://donofdetail.com/rv-detailing-reno-nv#service"}},
            {"@type": "Offer", "itemOffered": {"@id": "https://donofdetail.com/boat-detailing-reno-nv#service"}}
          ],
          "sameAs": [
            "https://www.instagram.com/donofdetail",
            "https://www.facebook.com/donofdetail",
            "https://www.google.com/maps/place/Don+of+Detail/@39.5296,-119.8138",
            "https://maps.app.goo.gl/mvf4PLGiRWU8wSAa7"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://donofdetail.com/#website",
          "name": "Don of Detail",
          "url": "https://donofdetail.com",
          "description": "Reno's premier mobile auto detailing service. Ceramic coating, paint correction, interior & exterior detailing. We come to you.",
          "publisher": {
            "@id": "https://donofdetail.com/#business"
          }
        }
      ]
    }
  </script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
